<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login | Sandra App</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #111827 100%);
            color: #e2e8f0;
        }

        .login-card {
            width: min(420px, calc(100vw - 32px));
            padding: 32px;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
        }

        .login-card h1 {
            margin: 0 0 16px;
            font-size: 1.8rem;
            color: #f8fafc;
        }

        .login-card p {
            margin: 0 0 24px;
            color: #94a3b8;
            line-height: 1.6;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        .field label {
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        .field input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
        }

        .field input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
        }

        .field-value {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
            line-height: 1.6;
            min-height: 48px;
            display: flex;
            align-items: center;
        }

        .submit-btn {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            background: #22c55e;
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .submit-btn:hover {
            background: #16a34a;
        }

        .hint {
            margin-top: 16px;
            font-size: 0.86rem;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <form class="login-card" id="login-form">
        <h1>Teacher Login</h1>
        <p>Enter your name and class number to load the moderation workspace.</p>

        <div class="field">
            <label for="teacher-input">Teacher name</label>
            <input id="teacher-input" name="teacher" type="text" autocomplete="name" placeholder="e.g. Ms Taylor"
                required>
        </div>

        <div class="field">
            <label for="class-input">Class number</label>
            <input id="class-input" name="class" type="text" autocomplete="organization" placeholder="e.g. 101"
                required>
        </div>

        <button type="submit" class="submit-btn">Continue to Workspace</button>
        <p class="hint">The classroom number will load with your teacher session.</p>
    </form>

    <script>
        const form = document.getElementById('login-form');
        form.addEventListener('submit', event => {
            event.preventDefault();
            const teacher = document.getElementById('teacher-input').value.trim();
            const classNumber = document.getElementById('class-input').value.trim();
            if (!teacher || !classNumber) {
                return;
            }
            const search = new URLSearchParams({ teacher, class: classNumber }).toString();
            window.location.href = `teacher.html?${search}`;
        });
    </script>
</body>

</html>
